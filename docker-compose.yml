version: "3.9"

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mkge_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - uploads:/app/uploads
    depends_on:
      - redis
    command: uvicorn src.mkge.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mkge_worker
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - uploads:/app/uploads
    depends_on:
      - redis
    command: celery -A src.mkge.infrastructure.celery_app worker --loglevel=info --concurrency=1
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: mkge_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: mkge_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    restart: unless-stopped

volumes:
  uploads:
